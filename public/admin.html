<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - PingPong</title>
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
       <header>
    <h1>🔧 Administration PingPong</h1>
    <div>
	<a href="/admin/matches" class="btn-secondary">📋 Historique</a>
        <a href="/" class="btn-secondary">← Classement</a>
        <button onclick="logout()" class="btn-logout">Déconnexion</button>
    </div>
</header>
    <div class="container">


        <section class="section">
            <h2>➕ Ajouter un joueur</h2>
            <div class="form-group">
                <input type="text" id="playerName" placeholder="Nom du joueur">
                <button onclick="addPlayer()" class="btn-primary">Ajouter</button>
            </div>
            <div id="message"></div>
        </section>

<section class="section">
    <h2>🎯 Enregistrer un match</h2>
    <div class="match-form">
        <div class="player-select">
            <label>Gagnant</label>
            <select id="winner"></select>
            <input type="number" id="winnerScore" placeholder="Score" min="0" value="21">
        </div>
        
        <div class="vs">VS</div>
        
        <div class="player-select">
            <label>Perdant</label>
            <select id="loser"></select>
            <input type="number" id="loserScore" placeholder="Score" min="0" value="15">
        </div>
    </div>
    <button onclick="recordMatch()" class="btn-primary">Enregistrer le match</button>
    <div id="matchMessage"></div>
</section>

        <section class="section">
            <h2>👥 Liste des joueurs</h2>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Rechercher..." onkeyup="filterPlayers()">
            </div>
            <table id="playersTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nom</th>
                        <th>Elo</th>
                        <th>Victoires</th>
                        <th>Défaites</th>
                        <th>Ratio</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </section>
    </div>
    <script src="/admin.js"></script>
</body>
</html>
