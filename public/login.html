<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PingPong Admin</title>
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <!-- ==================================================================== -->
    <!-- EN-TÊTE                                                              -->
    <!-- ==================================================================== -->
    <header class="main-header">
        <div class="header-content">
            <div class="logo">
                <span class="logo-icon">🏓</span>
                <h1 class="logo-text">Magnolia PingPong</h1>
            </div>
            <nav class="header-nav">
                <a href="/" class="nav-link">Classement</a>
            </nav>
        </div>
    </header>

    <!-- ==================================================================== -->
    <!-- CONTENU PRINCIPAL                                                    -->
    <!-- ==================================================================== -->
    <main class="login-container">
        <div class="login-box">
            <h2>🔐 Administration</h2>
            <p class="login-subtitle">Accès réservé aux administrateurs</p>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="password">Mot de passe</label>
                    <input type="password" id="password" placeholder="Mot de passe admin" required>
                </div>
                <button type="submit" class="btn-primary">Se connecter</button>
                <div id="message"></div>
            </form>
            
            <a href="/" class="link-back">← Retour au classement</a>
        </div>
    </main>

    <!-- ==================================================================== -->
    <!-- SCRIPTS                                                              -->
    <!-- ==================================================================== -->
    <script src="/js/login.js"></script>
</body>
</html>
