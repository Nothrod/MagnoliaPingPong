<!DOCTYPE html>
<html lang="fr">
<head>
    <!-- ==================================================================== -->
    <!-- Magnolia Ping Pong - Administration des Matchs (Historique)          -->
    <!-- ==================================================================== -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matchs - Admin Magnolia PingPong</title>
    
    <!-- ==================================================================== -->
    <!-- FEUILLES DE STYLE                                                    -->
    <!-- ==================================================================== -->
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/admin.css">
    <link rel="stylesheet" href="/css/admin-matches.css">
    <link rel="stylesheet" href="/css/modal.css">
</head>
<body>

<!-- ==================================================================== -->
<!-- EN-TÊTE / NAVIGATION                                                 -->
<!-- ==================================================================== -->
<header class="main-header">
    <div class="header-content">
        
        <!-- Logo à gauche -->
        <a href="/admin" class="logo">
            <img src="/images/logo.png" alt="Magnolia PingPong" class="logo-img">
        </a>
        
        <!-- Menu au milieu -->
        <nav class="header-nav">
            <a href="/admin" class="nav-link">🏠 Accueil</a>
            <a href="/admin/matches" class="nav-link active">📜 Matchs</a>
            <a href="/" class="nav-link">🌐 Retour au site</a>
        </nav>
        
        <!-- Déconnexion à droite -->
        <button class="btn-logout" onclick="logout()">🚪 Déconnexion</button>
        
    </div>
</header>

<!-- ==================================================================== -->
<!-- CONTENU PRINCIPAL                                                    -->
<!-- ==================================================================== -->
<div class="container">
    <section class="section">
        <h2>📜 Historique des matchs</h2>
        
        <!-- Filtres -->
        <div class="filters">
            <input type="text" id="searchInput" placeholder="🔍 Rechercher un joueur..." onkeyup="filterMatches()">
            <select id="filterPlayer" onchange="filterMatches()">
                <option value="">Tous les joueurs</option>
            </select>
        </div>
        
        <!-- Tableau des matchs -->
        <table id="matchesTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Date</th>
                    <th>Gagnant</th>
                    <th>Score</th>
                    <th>Perdant</th>
                    <th>Elo Change</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </section>
</div>

<!-- ==================================================================== -->
<!-- MODAL DE MODIFICATION                                                -->
<!-- ==================================================================== -->
<div id="editModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>✏️ Modifier le match</h2>
            <span class="close" onclick="closeModal()">&times;</span>
        </div>
        <div class="modal-body">
            <input type="hidden" id="editMatchId">
            
            <!-- Formulaire de modification -->
            <div class="match-form">
                <!-- Gagnant -->
                <div class="player-select">
                    <label>🏆 Gagnant</label>
                    <select id="editWinner"></select>
                    <input type="number" id="editWinnerScore" placeholder="Score" min="0" max="30">
                </div>
                
                <!-- VS -->
                <div class="vs">VS</div>
                
                <!-- Perdant -->
                <div class="player-select">
                    <label>💔 Perdant</label>
                    <select id="editLoser"></select>
                    <input type="number" id="editLoserScore" placeholder="Score" min="0" max="30">
                </div>
            </div>
            
            <!-- Message -->
            <div id="editMessage"></div>
            
            <!-- Boutons -->
            <div class="modal-footer">
                <button onclick="closeModal()" class="btn-secondary">Annuler</button>
                <button onclick="updateMatch()" class="btn-primary">Enregistrer</button>
            </div>
        </div>
    </div>
</div>

<!-- ==================================================================== -->
<!-- SCRIPTS                                                              -->
<!-- ==================================================================== -->
<script src="/js/admin-matches.js"></script>
<script src="/js/modal.js"></script>

</body>
</html>
