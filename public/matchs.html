<!DOCTYPE html>
<html lang="fr">
<head>
  <!-- ==================================================================== -->
  <!-- Magnolia Ping Pong - Historique Public des Matchs                    -->
  <!-- ==================================================================== -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Historique des matchs de ping-pong avec suivi Elo">
  <title>Matchs - Magnolia PingPong</title>
  
  <!-- ==================================================================== -->
  <!-- FEUILLES DE STYLE                                                    -->
  <!-- ==================================================================== -->
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/nav.css">
  <link rel="stylesheet" href="css/matchs.css">
</head>
<body>

<!-- ==================================================================== -->
<!-- NAVIGATION DYNAMIQUE                                                 -->
<!-- ==================================================================== -->
<div id="nav-placeholder"></div>

<!-- ==================================================================== -->
<!-- CONTENU PRINCIPAL                                                    -->
<!-- ==================================================================== -->
<main class="matches-page">
    <div class="container">
        
        <!-- ============================================================ -->
        <!-- EN-TÊTE DE PAGE                                              -->
        <!-- ============================================================ -->
        <div class="page-header">
            <h1>⚔️ Historique des Matchs</h1>
            <p class="subtitle">Retrouve tous les affrontements et leurs résultats</p>
        </div>

        <!-- ============================================================ -->
        <!-- SECTION STATISTIQUES RAPIDES                                 -->
        <!-- ============================================================ -->
        <section class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">🎯</div>
                <div class="stat-info">
                    <div class="stat-value" id="totalMatches">0</div>
                    <div class="stat-label">Matchs totaux</div>
                </div>
            </div>
            
            <div class="stat-card">
                <div class="stat-icon">🔥</div>
                <div class="stat-info">
                    <div class="stat-value" id="todayMatches">0</div>
                    <div class="stat-label">Aujourd'hui</div>
                </div>
            </div>
            
            <div class="stat-card">
                <div class="stat-icon">👑</div>
                <div class="stat-info">
                    <div class="stat-value" id="topPlayer">-</div>
                    <div class="stat-label">Plus de victoires</div>
                </div>
            </div>
            
<!-- Meilleure série de victoires -->
<div class="stat-card" id="streakCard">
    <div class="stat-icon">🔥</div>
    <div class="stat-info">
        <div class="stat-value" id="streakPlayer">-</div>
        <div class="stat-label" id="streakCount">0</div>
    </div>
</div>
        </section>

        <!-- ============================================================ -->
        <!-- SECTION FILTRES                                              -->
        <!-- ============================================================ -->
        <section class="filters-section">
            <div class="filters">
                <div class="filter-group">
                    <label for="searchPlayer">🔍 Joueur</label>
                    <input type="text" id="searchPlayer" placeholder="Rechercher un joueur...">
                </div>
                
                <div class="filter-group">
                    <label for="filterDate">📅 Période</label>
                    <select id="filterDate">
                        <option value="all">Tous les matchs</option>
                        <option value="today">Aujourd'hui</option>
                        <option value="week">Cette semaine</option>
                        <option value="month">Ce mois</option>
                    </select>
                </div>
                
                <div class="filter-group">
                    <label for="sortBy">🔃 Trier par</label>
                    <select id="sortBy">
                        <option value="date-desc">Plus récents</option>
                        <option value="date-asc">Plus anciens</option>
                        <option value="elo">Plus gros écarts Elo</option>
                    </select>
                </div>
            </div>
        </section>

        <!-- ============================================================ -->
        <!-- LISTE DES MATCHS                                             -->
        <!-- ============================================================ -->
        <section class="matches-list" id="matchesList">
            <div class="loading-state">
                <div class="loading-spinner"></div>
                <p>Chargement des matchs...</p>
            </div>
        </section>

        <!-- ============================================================ -->
        <!-- ÉTAT VIDE                                                    -->
        <!-- ============================================================ -->
        <div class="empty-state" id="emptyState" style="display: none;">
            <div class="empty-icon">🎮</div>
            <h3>Aucun match trouvé</h3>
            <p>Essaie de modifier tes filtres</p>
        </div>
        
    </div>
</main>

<!-- ==================================================================== -->
<!-- MODAL DÉTAIL D'UN MATCH                                              -->
<!-- ==================================================================== -->
<div class="modal" id="matchModal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>📋 Détails du match</h2>
            <span class="close" id="closeModal">&times;</span>
        </div>
        <div class="modal-body" id="modalBody">
            <!-- Contenu dynamique -->
        </div>
    </div>
</div>

<!-- ==================================================================== -->
<!-- SCRIPTS                                                              -->
<!-- ==================================================================== -->
<script src="/js/nav.js"></script>
<script src="/js/matchs.js"></script>

</body>
</html>
