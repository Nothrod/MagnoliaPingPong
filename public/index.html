<!DOCTYPE html>
<html lang="fr">
<head>
    <!-- ==================================================================== -->
    <!-- Magnolia Ping Pong - Page d'Accueil (Classement Elo)                 -->
    <!-- ==================================================================== -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Classement Elo des joueurs de ping-pong Magnolia">
    <title>Classement - Magnolia PingPong</title>
    
    <!-- ==================================================================== -->
    <!-- FEUILLES DE STYLE                                                    -->
    <!-- ==================================================================== -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/nav.css">
</head>
<body>

<!-- ==================================================================== -->
<!-- NAVIGATION DYNAMIQUE                                                 -->
<!-- ==================================================================== -->
<div id="nav-placeholder"></div>

<!-- ==================================================================== -->
<!-- CONTENU PRINCIPAL                                                    -->
<!-- ==================================================================== -->
<main class="container">
    
    <!-- ================================================================ -->
    <!-- SECTION : CLASSEMENT ELO                                         -->
    <!-- ================================================================ -->
    <section class="section">
        <h2>📊 Classement Elo</h2>
        <p class="subtitle">Classement des joueurs basé sur le système Elo</p>
        
        <table id="leaderboard">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Joueur</th>
                    <th>Elo</th>
                    <th>V</th>
                    <th>D</th>
                    <th>Ratio</th>
                    <th>Points</th>
                </tr>
            </thead>
            <tbody>
                <!-- Contenu chargé dynamiquement par app.js -->
            </tbody>
        </table>
    </section>
    
</main>

<!-- ==================================================================== -->
<!-- SCRIPTS                                                              -->
<!-- ==================================================================== -->
<script src="/js/nav.js"></script>
<script src="/js/app.js"></script>

</html>
